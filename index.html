<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖暖包</title>
    <style>
        * { box-sizing: border-box; transition: all 1s ease; }
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background-color: #050505;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        body.heating { background-color: #380808; } /* 暗紅 */

        .container { text-align: center; }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .heat-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 12px 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 0;
        }
        .heat-btn:hover { border-color: #888; color: #fff; }
        .heating .heat-btn { border-color: #ff4d4d; color: #ff4d4d; font-weight: bold; }

        /* 極簡強制彈窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            visibility: visible;
            transition: all 0.5s ease;
        }
        .modal-overlay.hide { opacity: 0; visibility: hidden; }
        
        .modal-content {
            max-width: 400px;
            padding: 40px;
            border: 1px solid #333;
            text-align: center;
        }
        .modal-content h2 {
            font-size: 1.2rem;
            color: #ff4d4d;
            margin-top: 0;
            letter-spacing: 2px;
        }
        .modal-content p {
            font-size: 0.8rem;
            color: #aaa;
            line-height: 1.8;
            text-align: justify;
            margin: 25px 0;
        }
        .modal-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="warningModal">
        <div class="modal-content">
            <h2>高溫與耗電警告</h2>
            <p>
                本網頁為「線上暖暖包」。確認進入後，系統將強制您的 CPU 與 GPU 滿載運算以快速產生熱能。<br><br>
                這將導致劇烈耗電。長時間高溫可能損害鋰電池壽命。若您同意自行承擔硬體風險，請點擊下方確認進入。
            </p>
            <button class="modal-btn" onclick="acceptWarning()">我已知曉風險，進入</button>
        </div>
    </div>

    <div class="container">
        <h1 id="status">手很冰嗎？</h1>
        <button class="heat-btn" id="toggleBtn" onclick="toggleHeat()">開啟極速發熱</button>
    </div>

    <canvas id="gpuCanvas" style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;" width="1" height="1"></canvas>

    <script>
        let isHeating = false;
        const workers = [];
        let gpuInterval = null;
        let wakeLock = null; // 修正 3：防止手機螢幕自動熄滅的變數
        const coreCount = navigator.hardwareConcurrency || 4;

        // 彈窗確認
        function acceptWarning() {
            document.getElementById('warningModal').classList.add('hide');
        }

        // 修正 3 的輔助函式：啟用螢幕防休眠
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('無法啟用防休眠功能');
            }
        }

        function toggleHeat() {
            const body = document.body;
            const btn = document.getElementById('toggleBtn');
            const status = document.getElementById('status');

            if (!isHeating) {
                isHeating = true;
                body.classList.add('heating');
                btn.innerText = '關閉暖氣';
                status.innerText = '雙引擎驅動中，晶片迅速升溫...';

                // 啟用防休眠
                requestWakeLock();

                // 1. CPU (加強運算複雜度)
                for (let i = 0; i < coreCount * 1.5; i++) { 
                    // 修正 2：在 Worker 內加上計時迴圈，確保程式碼不會被部分主動防禦的瀏覽器判定為「無回應腳本」而強制中斷
                    const blob = new Blob([`
                        onmessage = function() {
                            function heat() {
                                var start = Date.now();
                                while (Date.now() - start < 200) { 
                                    Math.atan(Math.tan(Math.sin(Math.random()) * Math.cos(Math.random()))); 
                                }
                                setTimeout(heat, 0);
                            }
                            heat();
                        }
                    `], { type: 'application/javascript' });
                    const worker = new Worker(URL.createObjectURL(blob));
                    worker.postMessage('start');
                    workers.push(worker);
                }

                // 2. GPU (透過 WebGL 渲染)
                const canvas = document.getElementById('gpuCanvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    gpuInterval = setInterval(() => {
                        for(let i=0; i<50000; i++) { 
                            gl.clear(gl.COLOR_BUFFER_BIT);
                        }
                    }, 1);
                }

            } else {
                isHeating = false;
                body.classList.remove('heating');
                btn.innerText = '開啟極速發熱';
                status.innerText = '手很冰嗎？';

                // 停止 CPU 運算
                workers.forEach(w => w.terminate());
                workers.length = 0;

                // 停止 GPU 運算
                if (gpuInterval) {
                    clearInterval(gpuInterval);
                    gpuInterval = null;
                }

                // 關閉防休眠
                if (wakeLock !== null) {
                    wakeLock.release();
                    wakeLock = null;
                }
            }
        }
    </script>
</body>
</html>
