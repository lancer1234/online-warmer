<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暖暖包</title>
    <style>
        * { box-sizing: border-box; transition: all 1s ease; }
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background-color: #050505;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        
        body.heating { background-color: #380808; } /* 暗紅 */

        .container { 
            text-align: center; 
            opacity: 1;
            transition: opacity 0.5s ease;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 40px;
        }

        .heat-btn {
            background: none;
            border: 1px solid #444;
            color: #aaa;
            padding: 12px 30px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 0;
        }
        .heat-btn:hover { border-color: #888; color: #fff; }
        .heating .heat-btn { border-color: #ff4d4d; color: #ff4d4d; font-weight: bold; }

        /* 強制彈窗，確保層級最高 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.98); /* 幾乎全黑 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 最高層級 */
            opacity: 1;
            visibility: visible;
            transition: all 0.5s ease;
        }
        .modal-overlay.hide { 
            opacity: 0; 
            visibility: hidden; 
            pointer-events: none; /* 防止點擊到已隱藏的彈窗 */
        }
        
        .modal-content {
            max-width: 400px;
            padding: 40px;
            border: 1px solid #333;
            text-align: center;
            background-color: #0c0c0c;
        }
        .modal-content h2 {
            font-size: 1.2rem;
            color: #ff4d4d;
            margin-top: 0;
            letter-spacing: 2px;
        }
        .modal-content p {
            font-size: 0.8rem;
            color: #aaa;
            line-height: 1.8;
            text-align: justify;
            margin: 25px 0;
        }
        .modal-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="warningModal">
        <div class="modal-content">
            <h2>高溫與耗電警告</h2>
            <p>
                本網頁為「線上暖暖包」。確認進入後，系統將強制您的 CPU 與 GPU 滿載運算以快速產生熱能。<br><br>
                這將導致劇烈耗電。長時間高溫可能損害鋰電池壽命。若您同意自行承擔硬體風險，請點擊下方確認進入。
            </p>
            <button class="modal-btn" onclick="acceptWarning()">我已知曉風險，進入</button>
        </div>
    </div>

    <div class="container" id="mainContainer">
        <h1 id="status">手很冰嗎？</h1>
        <button class="heat-btn" id="toggleBtn" onclick="toggleHeat()">開啟發熱</button>
    </div>

    <canvas id="gpuCanvas" style="position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none;" width="1" height="1"></canvas>

    <script>
        let isHeating = false;
        const workers = [];
        let gpuIsRunning = false;
        let wakeLock = null; // 防止螢幕熄滅
        const coreCount = navigator.hardwareConcurrency || 4;

        // 彈窗確認
        function acceptWarning() {
            document.getElementById('warningModal').classList.add('hide');
        }

        // 螢幕防休眠輔助函式
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('無法啟用防休眠功能');
            }
        }

        // 主執行緒 GPU 壓榨函式
        function runGpuStressTest(gl) {
            if (!gpuIsRunning) return;
            // 單次執行瘋狂繪製，壓榨 GPU
            for (let i = 0; i < 50000; i++) { 
                gl.clear(gl.COLOR_BUFFER_BIT);
            }
            // 遞迴調用，保持 GPU 運作
            requestAnimationFrame(() => runGpuStressTest(gl));
        }

        function toggleHeat() {
            const body = document.body;
            const btn = document.getElementById('toggleBtn');
            const status = document.getElementById('status');

            if (!isHeating) {
                isHeating = true;
                body.classList.add('heating');
                btn.innerText = '關閉暖氣';
                status.innerText = '驅動中，迅速升溫...';

                // 啟用防休眠
                requestWakeLock();

                // 1. CPU (Worker 保持，微調運算複雜度)
                // 減少數量至 1.0 倍核心數，為 GPU 運作留白
                for (let i = 0; i < coreCount; i++) { 
                    const blob = new Blob([`
                        onmessage = function() {
                            function heat() {
                                var start = Date.now();
                                while (Date.now() - start < 150) { 
                                    Math.atan(Math.tan(Math.sin(Math.random()) * Math.cos(Math.random()))); 
                                }
                                setTimeout(heat, 0);
                            }
                            heat();
                        }
                    `], { type: 'application/javascript' });
                    const worker = new Worker(URL.createObjectURL(blob));
                    worker.postMessage('start');
                    workers.push(worker);
                }

                // 2. GPU (移至主執行緒，WebGL 強制調用)
                const canvas = document.getElementById('gpuCanvas');
                const gl = canvas.getContext('webgl', { antialias: false, powerPreference: "high-performance" }) || canvas.getContext('experimental-webgl', { powerPreference: "high-performance" });
                if (gl) {
                    gpuIsRunning = true;
                    gl.clearColor(1.0, 0.0, 0.0, 1.0); // 設置清除顏色為紅色，方便確認調用
                    runGpuStressTest(gl);
                }

            } else {
                isHeating = false;
                body.classList.remove('heating');
                btn.innerText = '開啟發熱';
                status.innerText = '手很冰嗎？';

                // 停止 CPU 運算
                workers.forEach(w => w.terminate());
                workers.length = 0;

                // 停止 GPU 運算
                gpuIsRunning = false;

                // 關閉防休眠
                if (wakeLock !== null) {
                    wakeLock.release();
                    wakeLock = null;
                }
            }
        }
    </script>
</body>
</html>
